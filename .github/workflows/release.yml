name: Build

# 触发条件：
#   - push 一个 `v*` tag → 构建 + 上传到一个 draft GitHub Release
#   - 手动 workflow_dispatch → 构建 + 把产物作为 Actions artifact 上传（不创建 Release）
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: 一次出 universal 包（同时支持 Intel + Apple Silicon）
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_name: tunelo-macos
          # Windows: msi + NSIS exe
          - platform: windows-latest
            target: ''
            rust_targets: ''
            artifact_name: tunelo-windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # 缓存 cargo registry + src-tauri/target，加速后续 build
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: bun install

      # tauri-action:
      #   - 当 push tag 时，tagName 不空，会创建 draft release 并上传产物
      #   - 当 dispatch 时，tagName 留空 → 跳过 release，只在 src-tauri/target 留产物
      - name: Build with tauri-action
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Tunelo {0}', github.ref_name) || '' }}
          releaseBody: |
            Tunelo ${{ github.ref_name }}

            ## 下载
            - **Windows**: 推荐 `.exe` (NSIS installer)，也提供 `.msi`
            - **macOS**: `.dmg` (universal, 同时支持 Intel + Apple Silicon)

            ## 验证
            cargo + 单测全过；release build 经 `bun tauri build` 本地打包验证。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      # Windows 上额外产出免安装版：raw release exe 复制一份带版本号
      # 命名。`cargo build` 出来的 tunelo.exe 本身就是 self-contained，
      # 双击即跑（依赖 WebView2 Runtime，Win10 1903+ / Win11 默认已有）
      - name: Stage portable exe (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $cfg = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = $cfg.version
          $portable = "Tunelo_${version}_x64-portable.exe"
          Copy-Item -Force "src-tauri/target/release/tunelo.exe" $portable
          Write-Output "Portable exe staged at $portable"

      # workflow_dispatch 触发时把产物作为 artifact 上传（push tag 时已经走
      # release，重复上传太占空间，所以条件触发）
      - name: Upload Windows artifacts
        if: github.event_name == 'workflow_dispatch' && matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            Tunelo_*_x64-portable.exe
          if-no-files-found: error

      # push tag 触发时，tauri-action 已经创建了 draft release 并上传了
      # msi + nsis exe。这里把 portable exe 追加到同一个 release。
      - name: Append portable exe to release (Windows)
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: Tunelo_*_x64-portable.exe

      - name: Upload macOS artifacts
        if: github.event_name == 'workflow_dispatch' && matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error
